<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>BootStrap Learning | 12</title>
  </head>
  <body>
    <div class="container-fluid">
      <p class="display-4 text-bg-primary m-3">This text is important</p>
      <p class="display-4 text-bg-success m-3">This text indicates success</p>
      <p class="display-4 text-bg-info m-3">This text indicates some info</p>
      <p class="display-4 text-bg-warning m-3">This text represents some warning</p>
      <p class="display-4 text-bg-danger m-3">This text represents some danger</p>
      <p class="display-4 text-bg-secondary m-3">Secondary Background Color</p>
      <p class="display-4 text-bg-dark m-3">Dark Grey Background Color</p>
      <p class="display-4 text-bg-light m-3">Light Grey Background Color</p>
    </div>  
  </body>
</html>
