  <div>
    <button class="fancybutton" id="nextBtn">Next</button>

  </div>
  <script>
    let count = 0;
    let nextBtn = document.getElementById("nextBtn");
    let prevBtn = document.getElementById("prevBtn");

    function handleBoard(count) {
      let squares = [];
      let pieces = {
        "king_white": "&#9812;",
        "queen_white": "&#9813;",
        "rook_white": "&#9814;",
        "bishop_white": "&#9815;",
        "knight_white": "&#9816;",
        "pawn_white": "&#9817;",
        "king_black": "&#9818;",
        "queen_black": "&#9819;",
        "rook_black": "&#9820;",
        "bishop_black": "&#9821;",
        "knight_black": "&#9822;",
        "pawn_black": "&#9823;"
      };
      for (let i = 1; i <= 64; i++) {
        squares.push(document.getElementById(`sq${i}`));
      }
      switch (count) {
        case 0:
          squares[52].innerHTML = "&#9817 ";
          squares[44].innerHTML = " ";
          break;
        case 1:
          squares[52].innerHTML = " ";
          squares[44].innerHTML = "&#9817";
          break;
      }
    }

    nextBtn.onclick = function handleNext() {
      if (!(count + 1 > 1)) {
        count++;
        handleBoard(count);
      }
    }

    prevBtn.onclick = function handlePrev() {
      if (!(count - 1 < 0)) {
        count--;
        handleBoard(count);
      }
    }
  </script>
