<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indian Tricolor Flag 1a</title>
  <style>
    .seg {
      width: 600px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orange {
      background-color: #ff6820;
    }

    .white {
      background-color: #ffffff;
    }

    .green {
      background-color: #046a38;
    }

    #play {
      padding: 6px;
      font-family: arial;
      background-color: #4287f5;
      font-size: large;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="seg orange"></div>
  <div class="seg white">
    <img src="ashokachakra.png" width="190">
  </div>
  <div class="seg green"></div>
  <button id="play">Play the Indian National Anthem</button>
  <audio src="National-Anthem-India.mp3" id="audio"></audio>
  <script>
    let playBtn = document.getElementById("play");
    let audio = document.getElementById("audio");

    playBtn.onclick = function () {
      audio.play();
      playBtn.style.display = "none";
    };
  </script>
</body>

</html>
