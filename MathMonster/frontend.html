<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="frontend.css">
  <title>Math Quiz</title>
</head>

<body>
  <div id="main">
    <h1 id="question"></h1>
    <input id="answer" placeholder="✍️Type your answer here" type="number"><br>
    <button id="submit">Submit📜</button>
  </div>
  <div id="end">
    <h1>🎯🎊Horray! You have completed the Quiz! Here is your score: <span id="score"></span></h1>
    <div id="history">
    </div>
  </div>
  <script src="frontend.js"></script>
</body>

</html>
