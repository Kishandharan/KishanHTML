<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="frontend.css">
  <title>Math Quiz</title>
</head>

<body>
  <h1 id="title">Math Quiz</h1>
  <div id="main">
    <p id="question"></p>
    <input id="answer">
    <button id="submit">Submit</button>
  </div>
  <div id="end">
    <h1>Horray! You have completed the Quiz! Here is your score: <span id="score"></span></h1>
    <div id="history">
      <p>Q1 - 0</p>
    </div>
  </div>
  <script src="frontend.js"></script>
</body>

</html>
