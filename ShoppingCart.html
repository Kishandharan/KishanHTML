<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopping Cart</title>
  <style></style>
</head>

<body>
  <table id="table1"></table>
  <p>Total: <span id="text1"></span></p>

  <script>
    const table1 = document.getElementById("table1");
    const items1 = {
      "Apple": 10,
      "Banana": 10,
    };
    const keys1 = Object.keys(items1);
    const text1 = document.getElementById("text1");

    let total1 = 0;
    let count1 = 1;
    let addBtn1 = undefined;

    for (let x of keys1) {
      table1.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${x}</td>
          <td>${items1[x]}</td>
          <td><button id="btn${count1}">Add item</button></td>
        </tr>
      `);
      addBtn1 = document.getElementById(`btn${count1}`);
      addBtn1.onclick = function handle1() {
        total1 += items1[x];
        text1.textContent = total1.toString();
      }
      count1++;
    }
  </script>
</body>

</html>
