<!DOCTYPE html>
<html lang="en">

<head>

  <title>Color palette</title>
  <style>
    td {
      padding: 10px;
    }

</head>

<body>
  <table id="palette1">
  </table>
  <script>
    const palette1 = document.getElementById("palette1");

    result += "<tr>"

</body>

</html>
